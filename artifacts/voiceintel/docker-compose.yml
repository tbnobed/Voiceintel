version: "3.9"

services:

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Keep models loaded in VRAM forever — eliminates cold-start delays.
      # On a 12 GB RTX 4070 phi3:mini (~3.5 GB) easily stays resident.
      OLLAMA_KEEP_ALIVE: "-1"
    # GPU passthrough — Ollama auto-detects NVIDIA once it has device access.
    # Requires NVIDIA Container Toolkit on the host (see README).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # Pulls phi3:mini if missing, then issues a tiny generate request with
  # keep_alive=-1 so the model is loaded into memory and stays there. This
  # means the first real /analytics/insights click after a fresh stack-up
  # already finds the model warm — no 2-minute cold start.
  model-warmer:
    image: ollama/ollama
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if ollama list | grep -q "phi3:mini"; then
          echo "phi3:mini already present, skipping pull";
        else
          echo "Pulling phi3:mini...";
          ollama pull phi3:mini;
        fi
        echo "Warming phi3:mini into memory (keep_alive=-1)...";
        ollama run phi3:mini --keepalive=-1 "" >/dev/null 2>&1 || true;
        echo "Warm-up complete.";

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       voiceintel
      POSTGRES_USER:     voiceintel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceintel"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "${PORT:-5000}:5000"
    # GPU passthrough for faster-whisper transcription. The transcription
    # service auto-detects CUDA at startup and falls back to CPU if absent,
    # so this block can be removed on a CPU-only host.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      # ── Flask ───────────────────────────────────────────────────────────────
      SESSION_SECRET:       ${SESSION_SECRET}
      FLASK_ENV:            production
      PORT:                 5000

      # ── Database ────────────────────────────────────────────────────────────
      DATABASE_URL:         postgresql://voiceintel:${DB_PASSWORD:-changeme}@db:5432/voiceintel

      # ── Storage ─────────────────────────────────────────────────────────────
      STORAGE_DIR:          /data/storage

      # ── Whisper ─────────────────────────────────────────────────────────────
      # CPU host: keep `base` (or `small`). RTX 4070 (12 GB VRAM): set
      # WHISPER_MODEL=large-v3 in .env for substantially better accuracy
      # at GPU speed (≈3 GB VRAM resident).
      WHISPER_MODEL:        ${WHISPER_MODEL:-base}
      TRANSFORMERS_CACHE:   /data/model_cache
      HF_HOME:              /data/model_cache

      # ── SendGrid ────────────────────────────────────────────────────────────
      SENDGRID_API_KEY:     ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL:  ${SENDGRID_FROM_EMAIL:-}
      SENDGRID_FROM_NAME:   ${SENDGRID_FROM_NAME:-VoiceIntel}
      SENDGRID_ADMIN_EMAIL: ${SENDGRID_ADMIN_EMAIL:-}
      SENDGRID_WEBHOOK_KEY: ${SENDGRID_WEBHOOK_KEY:-}

      # ── Ollama (local AI — Analytics Insights) ───────────────────────────────
      OLLAMA_BASE_URL:      http://ollama:11434/v1

    volumes:
      # Audio files — persisted across container restarts
      - app_storage:/data/storage
      # Whisper model cache — avoids re-downloading on each restart
      - model_cache:/data/model_cache

volumes:
  db_data:
  app_storage:
  model_cache:
  ollama_data:
