<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accept Invitation — VoiceIntel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --surface: #0d0b00; --card: #1a1400; --border: rgba(175,155,70,0.16);
      --accent: #F7CE5B; --gold: #AF9B46; --vanilla: #DFD6A7; --sub: #AF9B46;
      --muted: rgba(175,155,70,0.5); --urgent: #e05c3a;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--vanilla);
      font-size: 14px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .wrap { width: 100%; max-width: 420px; padding: 24px; }
    .brand { text-align: center; margin-bottom: 24px; }
    .brand img {
      width: 110px; height: 110px; object-fit: contain;
      border-radius: 18px; margin-bottom: 14px;
      filter: drop-shadow(0 0 18px rgba(247,206,91,0.25));
    }
    .heading {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 24px; font-weight: 400; color: var(--vanilla);
      letter-spacing: -.3px; text-align: center; margin-bottom: 6px;
    }
    .subheading {
      text-align: center; color: var(--sub); font-size: 13px; margin-bottom: 24px;
    }
    .invite-meta {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; margin-bottom: 20px; font-size: 12px;
      display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap;
    }
    .invite-meta strong { color: var(--accent); font-weight: 600; }
    .invite-meta span { color: var(--sub); }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 28px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 10px; font-weight: 600; letter-spacing: .07em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .field input {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      color: var(--vanilla); font-family: inherit; font-size: 13px;
      padding: 9px 12px; border-radius: 6px; outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: var(--gold); }
    .field input::placeholder { color: var(--muted); }
    .field-help { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .btn-submit {
      width: 100%; padding: 11px; background: var(--accent); color: #000;
      border: none; border-radius: 6px; font-family: inherit; font-size: 13px;
      font-weight: 600; letter-spacing: .02em; cursor: pointer;
      transition: background .12s; margin-top: 8px;
    }
    .btn-submit:hover { background: var(--vanilla); }
    .error-msg {
      background: rgba(224,92,58,0.1); border: 1px solid rgba(224,92,58,0.25);
      color: var(--urgent); font-size: 12px; padding: 10px 14px; border-radius: 6px;
      margin-bottom: 18px;
    }
    .footer {
      text-align: center; margin-top: 18px; font-size: 11px; color: var(--muted);
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <img src="/static/logo.png" alt="VoiceIntel" />
    <div class="heading">Welcome to VoiceIntel</div>
    <div class="subheading">Set up your account to get started</div>
  </div>

  <div class="invite-meta">
    <span>Email</span>
    <strong>{{ invite.email }}</strong>
  </div>
  <div class="invite-meta">
    <span>Role</span>
    <strong>{{ role_label }}</strong>
  </div>

  <div class="card">
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="field">
        <label>Full Name</label>
        <input type="text" name="name" value="{{ invite.name }}" required />
      </div>
      <div class="field">
        <label>Choose a Password</label>
        <input type="password" name="password" placeholder="••••••••" required minlength="8" autocomplete="new-password" />
        <div class="field-help">At least 8 characters.</div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" name="password_confirm" placeholder="••••••••" required minlength="8" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-submit">Create Account &amp; Sign In</button>
    </form>
  </div>

  <div class="footer">
    By continuing you confirm you were invited by your team administrator.
  </div>
</div>
</body>
</html>
